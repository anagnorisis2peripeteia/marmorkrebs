name: ci

on:
  push:
  pull_request:

jobs:
  provider:
    name: provider checks (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm install
      - name: Build and test
        run: npm run check && npm run build && npm test
      - name: Provider bridge validation
        run: npm run validate:stryker-cxx-provider
